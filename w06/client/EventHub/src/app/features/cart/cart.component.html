<section class="cart">
  <h2>Your cart</h2>
  <div *ngIf="items.length === 0">Your cart is empty.</div>
    <ul *ngIf="items.length > 0">
    <li *ngFor="let it of items; let i = index">
      <div class="cart-item-main">
        <strong>{{ it.eventTitle }}</strong> — {{ it.ticketTypeName }} x {{ it.quantity }} — {{ it.price | currency }} ea
      </div>
      <div class="cart-item-meta">
        <div *ngIf="it.seat">Seat: {{ it.seat }}</div>
        <div *ngIf="it.buyerName">Buyer: {{ it.buyerName }}</div>
        <div *ngIf="it.buyerEmail">Email: {{ it.buyerEmail }}</div>
      </div>
      <button (click)="remove(i)">Remove</button>
    </li>
  </ul>
  <div *ngIf="items.length > 0">
    <p>Total: {{ total() | currency }}</p>
    <button (click)="checkout()">Checkout</button>
  </div>
</section>
